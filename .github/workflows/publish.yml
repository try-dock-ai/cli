name: Publish @trydock/cli with provenance

# Tag-driven release. Push a tag like `v0.4.2` from main and this
# workflow builds the tarball, publishes to npm with --provenance, and
# links the version back to this exact commit via Sigstore. Viewers on
# npmjs.com see the green "Published with provenance" badge.
on:
  push:
    tags:
      - "v*"

permissions:
  # Required for npm provenance to issue a Sigstore signature tied to
  # this workflow run. No other permissions needed.
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Guard — tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
